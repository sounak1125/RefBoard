<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Install RefBoard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="installer-shell" aria-label="RefBoard installer">
    <div class="scene-stack" id="sceneStack" aria-hidden="true"></div>
    <div class="cinematic-shade"></div>
    <div class="grain" aria-hidden="true"></div>

    <header class="window-bar">
      <div class="brand-lockup">
        <img src="refboard-icon.png" alt="" class="brand-icon">
        <span class="brand-name">REFBOARD</span>
        <span class="brand-divider"></span>
        <span class="brand-context">INSTALLER</span>
      </div>
      <div class="window-actions" aria-label="Window controls">
        <button class="window-button" type="button" aria-label="Minimize" data-window-action="minimize">
          <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M4 8.5h8"/></svg>
        </button>
        <button class="window-button close" type="button" aria-label="Close" data-window-action="close">
          <svg viewBox="0 0 16 16" aria-hidden="true"><path d="m5 5 6 6m0-6-6 6"/></svg>
        </button>
      </div>
    </header>

    <section class="feature-copy" aria-live="polite">
      <div class="copy-stage" id="copyStage"></div>
    </section>

    <footer class="installer-footer">
      <div class="feature-controls">
        <div class="transport-controls" aria-label="Slideshow controls">
          <button class="circle-button" type="button" id="previousButton" aria-label="Previous feature">
            <svg viewBox="0 0 20 20" aria-hidden="true"><path d="m12.5 5-5 5 5 5"/></svg>
          </button>
          <button class="circle-button" type="button" id="playButton" aria-label="Pause feature slideshow" aria-pressed="false">
            <svg class="pause-icon" viewBox="0 0 20 20" aria-hidden="true"><path d="M7 5v10M13 5v10"/></svg>
            <svg class="play-icon" viewBox="0 0 20 20" aria-hidden="true"><path d="m7 5 8 5-8 5Z"/></svg>
          </button>
          <button class="circle-button" type="button" id="nextButton" aria-label="Next feature">
            <svg viewBox="0 0 20 20" aria-hidden="true"><path d="m7.5 5 5 5-5 5"/></svg>
          </button>
        </div>

        <nav class="feature-tabs" id="featureTabs" aria-label="Explore RefBoard features"></nav>
      </div>

      <div class="install-zone">
        <div class="install-status-panel" id="installStatusPanel">
          <div class="install-status-row">
            <span class="install-state" id="installState">Ready to install</span>
            <span class="install-percent" id="installPercent">0%</span>
          </div>
          <div class="progress-track" role="progressbar" aria-label="Installation progress" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" id="progressTrack">
            <div class="progress-fill" id="installProgressBar"></div>
            <div class="progress-glow"></div>
          </div>
          <span class="install-meta" id="installMeta">Version 1.1.3 · Windows 64-bit</span>
        </div>
        <button class="install-button" id="installButton" type="button">
          <span class="button-label">Install RefBoard</span>
          <svg viewBox="0 0 20 20" aria-hidden="true"><path d="M10 3v9m0 0 3.5-3.5M10 12 6.5 8.5M4 16h12"/></svg>
        </button>
      </div>

      <div class="scene-timer" id="sceneTimer"></div>
    </footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
