name: Release RefBoard

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Clean dist folder
        run: if (Test-Path dist) { Remove-Item -Recurse -Force dist }

      - name: Build Windows installer
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: |
          $ok = $false
          foreach ($attempt in 1..3) {
            Write-Host "Build attempt $attempt"
            npm run dist
            if ($LASTEXITCODE -eq 0) { $ok = $true; break }
            if (Test-Path dist) { Remove-Item -Recurse -Force dist -ErrorAction SilentlyContinue }
            Start-Sleep -Seconds 15
          }
          if (-not $ok) { exit 1 }

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: RefBoard ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/latest.yml
            dist/*.blockmap
            dist/RefBoard-Setup-*.exe

      - name: Verify release artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = if ($env:GITHUB_REF -like 'refs/tags/*') { $env:GITHUB_REF.Substring(10) } else { git describe --tags --abbrev=0 }
          $assets = gh release view $tag --json assets --jq '.assets[].name'
          Write-Host $assets
          if ($assets -notmatch 'latest.yml') { throw 'latest.yml missing from release' }
          if ($assets -notmatch 'RefBoard-Setup-.*\.exe') { throw 'installer missing from release' }
          if ($assets -notmatch '\.blockmap') { throw 'blockmap missing from release' }
